name: Docker Publish

on:
  push:
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Quality Gate Before Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run quality:gate

  publish:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME }}
    steps:
      - name: Validate DockerHub credentials
        run: |
          test -n "$DOCKERHUB_USERNAME" || { echo "缺少 DOCKERHUB_USERNAME secret"; exit 1; }
          test -n "$DOCKERHUB_TOKEN" || { echo "缺少 DOCKERHUB_TOKEN secret"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        run: |
          repository_name="${GITHUB_REPOSITORY#*/}"
          image_name="${DOCKERHUB_IMAGE_NAME:-$repository_name}"
          echo "name=${DOCKERHUB_USERNAME}/${image_name}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
